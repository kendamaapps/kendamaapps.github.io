<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Kendama App Router Redirect</title>
    <script type="text/javascript">
      // This script checks if the page received a 404 and bundles the broken 
      // path into a clean URL parameter, then forces a reload back onto index.html
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?p=' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
