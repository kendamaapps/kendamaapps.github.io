<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kendama Trick Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Kendama Trick Generator</h1>
    <p class="subtitle">Generate a random kendama trick to practice.</p>

    <div class="trick-card">
      <h2 id="trick">Click the button to begin</h2>
    </div>

    <button id="generateBtn">Generate Trick</button>

    <div class="stats">
      <p>Tricks generated: <span id="count">0</span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
